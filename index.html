<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PulseMap | Tactical Intelligence System</title>
    <meta
      name="description"
      content="PulseMap is a real-time tactical intelligence dashboard tracking global conflict, protests, and critical events on an interactive map."
    />
    <!-- Open Graph -->
    <meta property="og:title" content="PulseMap — Tactical Intelligence System" />
    <meta
      property="og:description"
      content="Real-time global conflict and critical event monitoring. Live feeds from 30+ regional sources."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-preview.png" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PulseMap — Tactical Intelligence System" />
    <meta
      name="twitter:description"
      content="Real-time global conflict and critical event monitoring."
    />
    <!-- Favicon -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%23ef4444' opacity='0.15'/%3E%3Ccircle cx='16' cy='16' r='9' fill='%23ef4444' opacity='0.4'/%3E%3Ccircle cx='16' cy='16' r='5' fill='%23ef4444'/%3E%3C/svg%3E"
    />
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          {
            pageLanguage: 'en',
            includedLanguages: 'en,tr,de,fr,es,ru,ar,zh-CN',
            layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
            autoDisplay: false,
          },
          'google_translate_element_hidden'
        );
      }

      // High-performance translation trigger
      window.triggerTranslate = function (langCode) {
        // 1. Force the cookie (most reliable for Google Translate)
        const domain = location.hostname === 'localhost' ? '' : '; domain=' + location.hostname;
        document.cookie = 'googtrans=/en/' + langCode + '; path=/' + domain;
        document.cookie = 'googtrans=/en/' + langCode + '; path=/';

        // 2. Try to manipulate the dropdown if it exists
        const triggerDOM = () => {
          const select = document.querySelector('.goog-te-combo');
          if (select) {
            select.value = langCode;
            select.dispatchEvent(new Event('change', { bubbles: true }));
            return true;
          }
          return false;
        };

        if (!triggerDOM()) {
          // If DOM not ready, keep polling for a few seconds
          let attempts = 0;
          const interval = setInterval(() => {
            attempts++;
            if (triggerDOM() || attempts > 20) {
              clearInterval(interval);
              if (attempts > 20) location.reload(); // Fallback: reload to apply cookie
            }
          }, 300);
        } else {
          // Even if DOM trigger worked, sometimes a refresh is cleaner for the map
          // but we'll skip it for now to keep it smooth
        }
      };
    </script>
    <script
      type="text/javascript"
      src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"
    ></script>
    <style>
      /* ── AGGRESSIVELY HIDE GOOGLE TRANSLATE UI ── */

      /* Hide the top bar and banner completely */
      iframe.goog-te-banner-frame,
      .goog-te-banner-frame,
      .goog-te-balloon-frame,
      #goog-gt-tt,
      .skiptranslate,
      .goog-te-spinner-pos,
      .goog-te-gadget-icon {
        display: none !important;
        visibility: hidden !important;
      }

      /* Prevent Google from shifting the page layout */
      body {
        top: 0 !important;
        margin-top: 0 !important;
        position: static !important;
      }

      html {
        margin-top: 0 !important;
      }

      /* Keep translation dropdown hidden but accessible by script */
      #google_translate_element_hidden {
        position: absolute;
        top: -100px;
        left: 0;
        width: 0;
        height: 0;
        overflow: hidden;
        opacity: 0;
        pointer-events: none;
      }

      /* Hide 'suggest translation' highlights */
      .goog-text-highlight {
        background-color: transparent !important;
        box-shadow: none !important;
        border: none !important;
      }

      /* Prevent styling glitches on translated text */
      font {
        background-color: transparent !important;
        box-shadow: none !important;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <div id="google_translate_element_hidden"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
